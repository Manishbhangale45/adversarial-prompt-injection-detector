<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs - Prompt Shield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="cyber-body">
    <nav class="navbar navbar-expand-lg navbar-dark cyber-nav border-bottom border-secondary-subtle">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">Prompt Shield</a>
            <div class="navbar-nav ms-auto gap-2">
                <a class="nav-link" href="{{ url_for('index') }}">Scanner</a>
                <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
                <a class="nav-link active" href="{{ url_for('logs') }}">Logs</a>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="d-flex justify-content-between align-items-end flex-wrap gap-3 mb-4">
            <div>
                <span class="eyebrow">Audit Trail</span>
                <h1 class="display-6 fw-bold mt-2 mb-0">All scanned prompts</h1>
            </div>
            <a href="{{ url_for('index') }}" class="btn btn-outline-info">Back to Scanner</a>
        </div>

        <div class="glass-card">
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0 cyber-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Timestamp</th>
                            <th>Prompt</th>
                            <th>Prediction</th>
                            <th>Risk Score</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in logs %}
                            <tr>
                                <td>{{ row.id }}</td>
                                <td>{{ row.timestamp }}</td>
                                <td>{{ row.prompt }}</td>
                                <td><span class="badge {{ 'text-bg-danger' if row.prediction == 'Blocked' else 'text-bg-success' if row.prediction == 'Allowed' else 'text-bg-warning' }}">{{ row.prediction }}</span></td>
                                <td>{{ row.risk_score }}</td>
                            </tr>
                        {% else %}
                            <tr>
                                <td colspan="5" class="text-center text-secondary py-4">No log entries found.</td>
                            </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
